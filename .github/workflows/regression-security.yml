name: Regression and Security

on:
  pull_request:
  push:
    branches-ignore:
      - gh-pages

permissions:
  contents: read

jobs:
  regression-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project types
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          echo "has_npm=false" >> "$GITHUB_OUTPUT"
          echo "has_python=false" >> "$GITHUB_OUTPUT"
          echo "has_go=false" >> "$GITHUB_OUTPUT"
          echo "has_rust=false" >> "$GITHUB_OUTPUT"
          echo "has_dotnet=false" >> "$GITHUB_OUTPUT"

          if [ -f package.json ]; then echo "has_npm=true" >> "$GITHUB_OUTPUT"; fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ]; then echo "has_python=true" >> "$GITHUB_OUTPUT"; fi
          if [ -f go.mod ]; then echo "has_go=true" >> "$GITHUB_OUTPUT"; fi
          if [ -f Cargo.toml ]; then echo "has_rust=true" >> "$GITHUB_OUTPUT"; fi
          if ls *.sln *.csproj >/dev/null 2>&1; then echo "has_dotnet=true" >> "$GITHUB_OUTPUT"; fi

      - name: Setup Node
        if: steps.detect.outputs.has_npm == 'true'
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node regression tests
        if: steps.detect.outputs.has_npm == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi
          npm test --if-present

      - name: Setup Python
        if: steps.detect.outputs.has_python == 'true'
        continue-on-error: true
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python regression tests
        if: steps.detect.outputs.has_python == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
          pip install pytest
          if [ -d tests ] || find . -maxdepth 2 -type f -name 'test_*.py' | grep -q .; then
            pytest -q
          else
            echo "No Python tests found; skipping pytest run"
          fi

      - name: Setup Go
        if: steps.detect.outputs.has_go == 'true'
        continue-on-error: true
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Go regression tests
        if: steps.detect.outputs.has_go == 'true'
        continue-on-error: true
        run: go test ./...

      - name: Setup Rust
        if: steps.detect.outputs.has_rust == 'true'
        continue-on-error: true
        uses: dtolnay/rust-toolchain@stable

      - name: Rust regression tests
        if: steps.detect.outputs.has_rust == 'true'
        continue-on-error: true
        run: cargo test --all --all-features

      - name: Setup .NET
        if: steps.detect.outputs.has_dotnet == 'true'
        continue-on-error: true
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: .NET regression tests
        if: steps.detect.outputs.has_dotnet == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          if ls *.sln >/dev/null 2>&1; then
            dotnet test --nologo --verbosity minimal *.sln
          elif ls *Test*.csproj >/dev/null 2>&1; then
            dotnet test --nologo --verbosity minimal *Test*.csproj
          else
            echo "No .NET test target found; skipping"
          fi

      - name: Security scan (gitleaks)
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
